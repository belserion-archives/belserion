<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Belserion Archives</title>
  <style>
    body {
      background-color: #1A1612;
      color: #1A1612;
      font-family: Georgia, serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 20px;
      line-height: 1.6;
    }
    h1 {
      color: #C9A86A;
    }
    a {
      color: #C9A86A;
    }
  </style>
</head>
<body>
<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">

<style>
  body {
    background-color: #1A1612; /* warm brown */
    background-image:
      linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
    background-size: 40px 40px; /* subtle parchment texture */
    color: #E8E0D8; /* softer off‑white */
    font-family: 'Crimson Text', serif; /* Carrd‑coded fantasy serif */
    max-width: 800px;
    margin: 60px auto;
    padding: 20px;
    line-height: 1.75; /* more breathable */
  }

  h1, h2, h3 {
    color: #D4B47A; /* warm gold */
    margin-top: 0;
  }

  a {
    color: #D4B47A;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  /* Header box */
  .header-box {
    border: 1px solid #D4B47A;
    padding: 30px;
    margin-bottom: 40px;
    background: linear-gradient(135deg, #2A221C, #1A1612);
    text-align: center;
    border-radius: 8px; /* Carrd softness */
  }

  /* Navigation bar */
  nav {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 40px;
    border-bottom: 1px solid #D4B47A;
    padding-bottom: 15px;
  }

  /* Two-column section */
  .columns {
    display: flex;
    justify-content: space-between;
    gap: 40px;
    margin-top: 50px;
  }

  .column ul {
    list-style: none;
    padding: 0;
    line-height: 1.8;
  }

  /* Centered codex block */
  .codex-box {
    border: 1px solid #D4B47A;
    padding: 25px;
    margin: 50px 0;
    background: #151515;
    border-radius: 6px;
  }

  /* Footer */
  footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid #D4B47A;
    text-align: center;
    font-size: 14px;
    color: #A08F7A;
  }
  <body/>
</style>
</html>
